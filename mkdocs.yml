site_name: Roni Herschmann
site_description: Personal site of Roni Herschmann
site_url: https://roniherschmann.com/

theme:
  name: material
  language: en
  favicon: assets/images/favicon.ico
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/roniherschmann
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/roni-h-488aba18b/
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/roniherschmann

extra_css:
  - stylesheets/extra.css

plugins:
  - search

copyright: "&copy; 2026 Roni Herschmann"
